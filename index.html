<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lunar Escape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; max-height: 100vh; }
    #game-container { max-width: 430px; max-height: 932px; width: 100%; height: 100%; }

    /* Desktop phone frame */
    @media (min-width: 500px) and (min-height: 600px) {
      #game-container {
        border: 3px solid #2a2a3a;
        border-radius: 32px;
        overflow: hidden;
        box-shadow:
          0 0 0 2px #1a1a28,
          0 0 40px rgba(0, 80, 160, 0.15),
          0 20px 60px rgba(0, 0, 0, 0.5);
        max-height: min(932px, calc(100vh - 40px));
      }
      body { padding: 20px; }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
